{% extends "base.html" %}

{% block title %}Login - Organizer{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 80px auto;">
    <div class="card">
        <h2 class="card-title">Welcome Back! 👋</h2>
        <p style="color: var(--text-muted); margin-bottom: 24px;">Please enter your details to sign in.</p>

        <form method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" class="form-input" required placeholder="User">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" class="form-input" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
        </form>

        <div style="margin-top: 24px; text-align: center; font-size: 0.875rem;">
            Don't have an account? <a href="{{ url_for('register') }}"
                style="color: var(--primary); font-weight: 600;">Register here</a>
        </div>
    </div>
</div>
{% endblock %}
