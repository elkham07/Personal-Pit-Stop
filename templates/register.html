{% extends "base.html" %}

{% block title %}Register - Organizer{% endblock %}

{% block content %}
<div style="max-width: 450px; margin: 80px auto;">
    <div class="card">
        <h2 class="card-title">Join Us! 🚀</h2>
        <p style="color: var(--text-muted); margin-bottom: 24px;">Create your personal account to get started.</p>

        <form method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" class="form-input" required placeholder="User">
            </div>

            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" name="email" id="email" class="form-input" required placeholder="user@example.com">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" class="form-input" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
        </form>

        <div style="margin-top: 24px; text-align: center; font-size: 0.875rem;">
            Already have an account? <a href="{{ url_for('login') }}"
                style="color: var(--primary); font-weight: 600;">Sign in here</a>
        </div>
    </div>
</div>
{% endblock %}
