{% extends "base.html" %}

{% block title %}Edit Task - Organizer{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 40px auto;">
    <div class="card">
        <h2 class="card-title">Edit Task ✏️</h2>
        <form method="POST">
            <div class="form-group">
                <label>Title</label>
                <input type="text" name="title" class="form-input" value="{{ task.title }}" required>
            </div>
            <div class="form-group">
                <label>Description (optional)</label>
                <textarea name="description" class="form-input" rows="4">{{ task.description or '' }}</textarea>
            </div>
            <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div>
                    <label>Best Lap (Target)</label>
                    <input type="number" name="best_lap" class="form-input" value="{{ task.best_lap }}">
                </div>
                <div>
                    <label>Actual Time</label>
                    <input type="number" name="actual_time" class="form-input" value="{{ task.actual_time }}">
                </div>
            </div>
            <div class="form-group">
                <label>Priority</label>
                <select name="priority" class="form-input">
                    <option value="low" {% if task.priority=='low' %}selected{% endif %}>Soft</option>
                    <option value="medium" {% if task.priority=='medium' %}selected{% endif %}>Medium</option>
                    <option value="high" {% if task.priority=='high' %}selected{% endif %}>Hard</option>
                </select>
            </div>
            <div class="form-group">
                <label>Deadline</label>
                <input type="date" name="deadline" class="form-input"
                    value="{{ task.deadline.strftime('%Y-%m-%d') if task.deadline else '' }}">
            </div>
            <div style="display: flex; gap: 12px; margin-top: 24px;">
                <button type="submit" class="btn btn-primary" style="flex: 1;">Save Changes</button>
                <a href="{{ url_for('tasks') }}" class="btn btn-secondary"
                    style="flex: 1; text-align: center;">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
